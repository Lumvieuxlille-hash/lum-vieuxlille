<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LÜM - Réservation - Vieux Lille</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lora:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* --- DESIGN SYSTEM LÜM --- */
        :root {
            --bg-color: #faf1e6;
            --text-color: #954825;
            --accent-color: #bf6d45;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px rgba(149, 72, 37, 0.08);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: 'Montserrat', sans-serif;
            --font-serif: 'Lora', serif;
        }

        /* --- RESET & BASICS --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-main); 
            line-height: 1.6; 
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            padding: 20px;
        }

        /* --- HEADER & LOGO --- */
        header { text-align: center; margin-bottom: 40px; width: 100%; max-width: 500px; }
        .logo-placeholder {
            width: 120px; height: 120px;
            margin: 0 auto 15px auto;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .logo-placeholder img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        h1 { font-family: var(--font-serif); font-weight: 700; font-size: 2.8em; font-style: italic; margin-bottom: 5px; color: var(--text-color); }
        .subtitle { font-size: 1em; color: var(--accent-color); font-weight: 400; letter-spacing: 1px; text-transform: uppercase; }

        /* --- MAIN CONTAINER (CARD) --- */
        .booking-card {
            background: var(--card-bg);
            width: 100%; max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        /* --- PROGRESS BAR --- */
        .progress-container { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .progress-container::after { content:''; position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: #eee; z-index: 1; }
        .progress-bar-fill { position: absolute; top: 15px; left: 0; height: 2px; background: var(--text-color); z-index: 2; transition: var(--transition); width: 0%; }
        .step-node { width: 32px; height: 32px; background: white; border: 2px solid #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #ccc; z-index: 3; transition: var(--transition); }
        .step-node.active { border-color: var(--text-color); color: var(--text-color); background: var(--bg-color); }
        .step-node.done { border-color: var(--text-color); color: white; background: var(--text-color); }

        /* --- FORM ELEMENTS --- */
        .form-step { display: none; opacity: 0; transform: translateY(20px); transition: var(--transition); }
        .form-step.active { display: block; opacity: 1; transform: translateY(0); }

        h2 { font-size: 1.4em; margin-bottom: 25px; color: var(--text-color); font-weight: 600; text-align: center;}

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-weight: 600; font-size: 0.85em; margin-bottom: 8px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px;}
        input, select, textarea { 
            width: 100%; padding: 16px; 
            border: 2px solid #f0f0f0; border-radius: 12px; 
            background: #fff; color: var(--text-color);
            font-size: 16px; font-family: var(--font-main);
            transition: var(--transition);
        }
        textarea { resize: none; min-height: 80px; }
        input:focus, select:focus, textarea:focus { border-color: var(--text-color); box-shadow: 0 0 0 4px rgba(149, 72, 37, 0.1); }
        input::placeholder, textarea::placeholder { color: #ccc; }

        /* Choix Weekend */
        .choice-group { display: flex; gap: 15px; margin-bottom: 25px; }
        .choice-btn { 
            flex: 1; text-align: center; padding: 20px; 
            border: 2px solid #f0f0f0; border-radius: 16px; cursor: pointer; 
            transition: var(--transition); background: white;
        }
        .choice-btn:hover { border-color: var(--accent-color); background: var(--bg-color); }
        .choice-btn.selected { border-color: var(--text-color); background: var(--text-color); color: white; }
        .choice-btn strong { display: block; font-size: 1.2em; margin-bottom: 5px; }
        .choice-btn span { font-size: 0.85em; opacity: 0.8; }

        /* Grille Horaires */
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .time-slot { 
            text-align: center; padding: 12px; 
            border: 2px solid #f0f0f0; border-radius: 10px; cursor: pointer; 
            transition: var(--transition); background: white; font-weight: 600;
        }
        .time-slot:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .time-slot.selected { border-color: var(--text-color); background: var(--text-color); color: white; }
        
        .limit-info { font-size: 0.8em; color: var(--accent-color); font-style: italic; margin-top: 10px; text-align: center;}

        /* --- BOUTONS NAVIGATION --- */
        .btn-group { display: flex; gap: 15px; margin-top: 35px; }
        button { 
            flex: 1; padding: 18px; border: none; border-radius: 14px; 
            font-size: 16px; font-weight: 700; cursor: pointer; 
            transition: var(--transition); font-family: var(--font-main);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-next { background-color: var(--text-color); color: white; }
        .btn-next:hover { background-color: #7a3a1d; transform: translateY(-2px); }
        .btn-back { background-color: #f0f0f0; color: #888; }
        .btn-back:hover { background-color: #e0e0e0; color: #555;}

        #tuesdayWarning { text-align: center; color: #d9534f; background: #ffefef; padding: 15px; border-radius: 10px; margin-bottom: 20px;}
    </style>
</head>
<body>

    <header>
        <div class="logo-placeholder">
            <img src="LOGO LUM.png" alt="Logo LÜM">
        </div>
        <h1>LÜM</h1>
        <p class="subtitle">Coffee Shop • Vieux Lille</p>
    </header>

    <div class="booking-card">
        <div class="progress-container">
            <div class="progress-bar-fill" id="progressBar"></div>
            <div class="step-node active" data-step="1">1</div>
            <div class="step-node" data-step="2">2</div>
            <div class="step-node" data-step="3">3</div>
        </div>

        <form id="reservationForm" action="https://script.google.com/macros/s/AKfycbw-_s9rf2yUTIrAxiBMiSR08fhjynjDOMqUmuH-xUujnQR5nB8afKtEgIefjpTM-Ird/exec" method="POST">
            
            <div class="form-step active" id="step1">
                <h2>Faisons connaissance ☺️</h2>
                <div class="input-group">
                    <label for="nom">Nom & Prénom *</label>
                    <input type="text" id="nom" name="nom" required placeholder="Ex: Alexia Martin">
                </div>
                <div class="input-group">
                    <label for="email">Adresse Email *</label>
                    <input type="email" id="email" name="email" required placeholder="Ex: alexia@email.com">
                </div>
                <div class="input-group">
                    <label for="phone">Téléphone *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Ex: 06 12 34 56 78" pattern="[0-9]{10}">
                </div>
                <div class="input-group">
                    <label for="personnes">Nombre de personnes *</label>
                    <input type="number" id="personnes" name="personnes" min="1" max="15" value="2" required>
                </div>
                <div class="input-group">
                    <label for="commentaires">Commentaires (Optionnel)</label>
                    <textarea id="commentaires" name="commentaires" placeholder="Une allergie ? Une poussette ? Dites-nous tout..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn-next" onclick="nextStep(1)">Continuer</button>
                </div>
            </div>

            <div class="form-step" id="step2">
                <h2>Quand souhaitez-vous venir ?</h2>
                <div class="input-group">
                    <label for="date">Choisir une date *</label>
                    <input type="date" id="date" name="date" required onchange="handleDateChange()">
                </div>
                <div id="tuesdayWarning" style="display:none;">Oh ! Nous sommes fermés le mardi. 🤫</div>
                <div id="dateTimeSection" style="display:none;">
                    <div id="weekendChoice" style="display:none;">
                        <label>Quel type d'expérience ? *</label>
                        <div class="choice-group">
                            <input type="hidden" name="typeReservation" id="typeReservation">
                            <div class="choice-btn" id="choiceBrunch" onclick="selectType('Brunch')">
                                <strong>BRUNCH</strong>
                                <span>Menu dédié (Sam-Dim)</span>
                            </div>
                            <div class="choice-btn" id="choiceMoment" onclick="selectType('Pause gourmande au LÜM')">
                                <strong>PAUSE GOURMANDE</strong>
                                <span>Carte classique</span>
                            </div>
                        </div>
                    </div>
                    <div id="timeSection">
                        <label>Choisir votre horaire *</label>
                        <input type="hidden" name="heure" id="heure" required>
                        <div class="time-grid" id="timeGrid"></div>
                        <div class="limit-info" id="brunchLimitInfo" style="display:none;">Limite de 15 personnes par créneau Brunch.</div>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn-back" onclick="prevStep(2)">Retour</button>
                    <button type="button" class="btn-next" onclick="nextStep(2)">Vérifier mes infos</button>
                </div>
            </div>

            <div class="form-step" id="step3">
                <h2>C'est presque bon !</h2>
                <div style="background: var(--bg-color); padding: 25px; border-radius: 16px; color: var(--text-color);">
                    <p style="margin-bottom: 10px;">👤 <strong id="summaryNom"></strong></p>
                    <p style="margin-bottom: 10px;">📧 <span id="summaryEmail"></span></p>
                    <p style="margin-bottom: 10px;">📞 <span id="summaryPhone"></span></p>
                    <p style="margin-bottom: 10px; border-top: 1px solid #e0e0e0; padding-top: 10px;">👥 <strong id="summaryPers"></strong> personnes</p>
                    <p>🗓️ le <strong id="summaryDate"></strong> à <strong id="summaryHeure"></strong></p>
                    <p id="summaryType" style="margin-top: 5px; font-style: italic; color: var(--accent-color);"></p>
                    <p id="summaryComm" style="margin-top: 10px; font-size: 0.9em; border-top: 1px dashed #ccc; padding-top: 10px; color: #666; display: none;"></p>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn-back" onclick="prevStep(3)">Modifier</button>
                    <button type="submit" class="btn-next">Confirmer ma demande</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // --- SÉCURITÉ : BLOQUER LES DATES PASSÉES ---
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('date').min = `${yyyy}-${mm}-${dd}`;

        const OPEN_HOUR = 10;
        const CLOSE_HOUR = 18;
        const BRUNCH_TIMES = ["11:00", "12:30", "14:00"];

        function updateProgress(step) {
            const progressBar = document.getElementById('progressBar');
            const stepNodes = document.querySelectorAll('.step-node');
            progressBar.style.width = ((step - 1) / (stepNodes.length - 1)) * 100 + '%';
            stepNodes.forEach((node, index) => {
                if (index < step - 1) node.className = 'step-node done';
                else if (index === step - 1) node.className = 'step-node active';
                else node.className = 'step-node';
            });
        }

        function nextStep(currentStep) {
            if (currentStep === 1) {
                const fields = ['nom', 'email', 'phone', 'personnes'];
                for (let f of fields) {
                    if (!document.getElementById(f).value) { alert("Merci de remplir tous les champs obligatoires."); return; }
                }
                if(!document.getElementById('email').checkValidity() || !document.getElementById('phone').checkValidity()) {
                    alert("Email ou téléphone invalide."); return;
                }
            }
            if (currentStep === 2) {
                if (!document.getElementById('date').value || !document.getElementById('heure').value || !document.getElementById('typeReservation').value) {
                    alert("Veuillez sélectionner date, expérience et horaire."); return;
                }
                fillSummary();
            }
            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + (currentStep + 1)).classList.add('active');
            updateProgress(currentStep + 1);
        }

        function prevStep(currentStep) {
            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + (currentStep - 1)).classList.add('active');
            updateProgress(currentStep - 1);
        }

        function handleDateChange() {
            const dateVal = document.getElementById('date').value;
            const dateTimeSection = document.getElementById('dateTimeSection');
            const tuesdayWarning = document.getElementById('tuesdayWarning');
            dateTimeSection.style.display = 'none';
            tuesdayWarning.style.display = 'none';
            document.getElementById('heure').value = '';
            document.getElementById('typeReservation').value = '';
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('timeGrid').innerHTML = '';

            if (!dateVal) return;

            const day = new Date(dateVal).getDay();
            if (day === 2) { tuesdayWarning.style.display = 'block'; } 
            else {
                dateTimeSection.style.display = 'block';
                if (day === 0 || day === 6) { 
                    document.getElementById('weekendChoice').style.display = 'block';
                } else { 
                    document.getElementById('weekendChoice').style.display = 'none';
                    document.getElementById('typeReservation').value = 'Pause gourmande au LÜM';
                    generateStandardHours();
                }
            }
        }

        function selectType(type) {
            document.getElementById('typeReservation').value = type;
            document.getElementById('choiceBrunch').classList.toggle('selected', type === 'Brunch');
            document.getElementById('choiceMoment').classList.toggle('selected', type !== 'Brunch');
            document.getElementById('brunchLimitInfo').style.display = (type === 'Brunch') ? 'block' : 'none';
            document.getElementById('heure').value = '';
            if (type === 'Brunch') generateBrunchHours(); else generateStandardHours();
        }

        function generateBrunchHours() {
            const grid = document.getElementById('timeGrid'); grid.innerHTML = '';
            BRUNCH_TIMES.forEach(t => createTimeButton(t, grid));
        }

        function generateStandardHours() {
            const grid = document.getElementById('timeGrid'); grid.innerHTML = '';
            for (let h = OPEN_HOUR; h < CLOSE_HOUR; h++) {
                createTimeButton(`${h}:00`, grid);
                if(h <= 17) createTimeButton(`${h}:30`, grid);
            }
        }

        function createTimeButton(time, container) {
            const btn = document.createElement('div');
            btn.className = 'time-slot'; btn.innerText = time.replace(':','h');
            btn.onclick = () => {
                document.getElementById('heure').value = time;
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                btn.classList.add('selected');
            };
            container.appendChild(btn);
        }

        function fillSummary() {
            document.getElementById('summaryNom').innerText = document.getElementById('nom').value;
            document.getElementById('summaryEmail').innerText = document.getElementById('email').value;
            document.getElementById('summaryPhone').innerText = document.getElementById('phone').value;
            document.getElementById('summaryPers').innerText = document.getElementById('personnes').value;
            
            const d = new Date(document.getElementById('date').value);
            const opt = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('summaryDate').innerText = d.toLocaleDateString('fr-FR', opt);
            
            document.getElementById('summaryHeure').innerText = document.getElementById('heure').value.replace(':','h');
            document.getElementById('summaryType').innerText = "(" + document.getElementById('typeReservation').value + ")";
            
            const comm = document.getElementById('commentaires').value;
            const sComm = document.getElementById('summaryComm');
            if(comm.trim()) { sComm.innerText = "Note : " + comm; sComm.style.display = "block"; } else { sComm.style.display = "none"; }
        }
        updateProgress(1);
    </script>
</body>
</html>
